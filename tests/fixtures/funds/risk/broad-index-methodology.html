<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>公开合成宽基指数编制方案</title>
  </head>
  <body>
    <h1>公开合成宽基指数编制方案</h1>
    <p>生效日期：2026年2月1日</p>
    <h2>指数目标</h2>
    <p>跟踪指数：公开合成300指数。</p>
    <p>跟踪目标：日均跟踪偏离度的绝对值不超过0.35%。</p>
    <p>该指数反映多个行业中具有代表性的上市证券整体表现，不跟踪单一行业或主题。</p>
    <h2>样本与权重限制</h2>
    <p>指数样本数量为300只。</p>
    <p>单一最大样本权重不超过10%。</p>
    <p>前十大样本权重合计不超过40%。</p>
    <p>单一最大行业权重不超过35%。</p>
    <p>指数覆盖行业数量不少于5个。</p>
  </body>
</html>
