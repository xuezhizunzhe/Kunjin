    <h1>公开合成行业基金产品资料概要</h1>
    <p>自2026年3月1日起生效。</p>
    <h2>投资目标</h2>
    <p>本基金主要投资于公开合成科技主题证券。</p>
    <h2>投资范围</h2>
    <p>投资于科技主题证券的比例不低于非现金基金资产的80%。</p>
    <p>股票资产占基金资产的比例为80%-95%。</p>
